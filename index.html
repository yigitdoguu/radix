<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rach OS | Next-Gen Operating System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #58a6ff;
            --bg: #05070a;
            --card-bg: rgba(13, 17, 23, 0.9);
            --border: #30363d;
            --text: #c9d1d9;
            --neon: 0 0 15px rgba(88, 166, 255, 0.4);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Fira Code', monospace;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        /* Navigasyon */
        nav {
            width: 100%; padding: 20px 0;
            display: flex; justify-content: center; gap: 30px;
            background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100;
        }

        nav a { color: #8b949e; text-decoration: none; font-size: 0.9rem; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        nav a:hover { color: var(--primary); text-shadow: var(--neon); }

        /* Rach OS Welcome Screen */
        .welcome-box {
            margin: 80px 0; text-align: center; padding: 60px;
            border: 1px solid var(--primary); border-radius: 15px;
            background: rgba(88, 166, 255, 0.02); box-shadow: var(--neon);
        }

        #dynamic-text {
            font-size: 3.5rem; font-weight: 800; color: var(--primary);
            text-shadow: 0 0 10px var(--primary); transition: opacity 0.5s;
            letter-spacing: 4px; margin: 20px 0;
        }

        .os-tag { color: #555; font-size: 0.8rem; letter-spacing: 5px; }

        /* Sistem Kartları */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; width: 90%; max-width: 1000px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 30px; border-radius: 12px; transition: 0.3s; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }

        .btn {
            display: block; border: 1px solid var(--primary); color: var(--primary);
            padding: 12px; text-align: center; border-radius: 5px;
            text-decoration: none; margin-top: 20px; transition: 0.3s; font-weight: bold;
        }
        .btn:hover { background: var(--primary); color: var(--bg); }
    </style>
</head>
<body>

    <nav>
        <a href="#welcome"><i class="fas fa-terminal"></i> Welcome</a>
        <a href="#downloads"><i class="fas fa-download"></i> Downloads</a>
        <a href="#about"><i class="fas fa-microchip"></i> About Rach OS</a>
    </nav>

    <div class="welcome-box" id="welcome">
        <i class="fas fa-code fa-2x" style="color: var(--primary)"></i>
        <div id="dynamic-text">RACH OS</div>
        <div class="os-tag">KERNEL v1.0.0-STABLE</div>
    </div>

    <div class="grid" id="downloads">
        <div class="card">
            <i class="fab fa-linux fa-3x" style="color: var(--primary)"></i>
            <h3>Rach OS Core</h3>
            <p>Minimalist, Hyprland tabanlı ve ultra performanslı çekirdek yapısı.</p>
            <a href="#" class="btn">ISO İNDİR</a>
        </div>
        <div class="card">
            <i class="fas fa-book-open fa-3x" style="color: var(--primary)"></i>
            <h3>Dokümantasyon</h3>
            <i class="fas fa-book-open fa-3x" style="color: var(--primary)"></i>
            <p>Sistemi nasıl kuracağını ve özelleştireceğini öğren.</p>
            <a href="#" class="btn">REHBERE GİT</a>
        </div>
    </div>

    <footer style="margin: 50px; color: #333; font-size: 0.8rem;">
        &copy; 2026 Rach OS Project. Bağımsız olarak geliştirilmiştir.
    </footer>

    <script>
        const words = ["WELCOME", "HOŞ GELDİNİZ", "ДОБРО ПОЖАЛОВАТЬ", "RACH OS", "SYSTEM READY"];
        let i = 0;
        const el = document.getElementById("dynamic-text");
        setInterval(() => {
            el.style.opacity = 0;
            setTimeout(() => {
                i = (i + 1) % words.length;
                el.innerText = words[i];
                el.style.opacity = 1;
            }, 500);
        }, 3000);
    </script>
</body>
</html>
